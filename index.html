<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Task Tamer · Homework Manager</title>
<meta name="description" content="Task Tamer · Paste your teacher's homework, auto-detect every deadline, get reminders so nothing slips, and keep group work organized.">
<meta name="theme-color" content="#5B6CF6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Task Tamer">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='15' fill='%235B6CF6'/><path d='M17 33 L28 44 L47 21' fill='none' stroke='%23ffffff' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/></svg>">
<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
<style>
  :root{
    --primary:#5B6CF6; --primary-d:#4A5AE0; --primary-soft:#EEF0FE;
    --bg:#F4F5FA; --card:#FFFFFF; --ink:#1A1D29; --sub:#8A90A2;
    --line:#EDEEF3; --gray:#9AA0AE; --blue:#3B82F6; --green:#22C55E;
    --red:#EF4444; --amber:#F59E0B;
    --shadow:0 6px 24px rgba(40,44,80,.08);
    --shadow-s:0 2px 10px rgba(40,44,80,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:#dcdde4;display:flex;justify-content:center;align-items:flex-start;color:var(--ink);
  }
  .phone{width:412px;max-width:100%;min-height:100vh;background:var(--bg);position:relative;
    box-shadow:0 10px 50px rgba(0,0,0,.18);overflow:hidden;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink);outline:none;border:none;background:none;}
  .fade-enter-active,.fade-leave-active{transition:opacity .18s;}
  .fade-enter-from,.fade-leave-to{opacity:0;}

  /* ========== Login ========== */
  .login{flex:1;display:flex;flex-direction:column;color:#fff;
    background:radial-gradient(130% 80% at 50% 0%,#7B86FF 0%,#5B6CF6 45%,#4A5AE0 100%);
    padding:84px 30px 36px;}
  .login .logo{display:flex;justify-content:center;filter:drop-shadow(0 14px 30px rgba(0,0,0,.28));}
  .login .logo .lb{width:98px;height:98px;border-radius:27px;background:linear-gradient(158deg,#F3F4FF 0%,#FFFFFF 70%);display:flex;align-items:center;justify-content:center;}
  .login h1{text-align:center;font-size:30px;font-weight:850;letter-spacing:1px;margin-top:14px;}
  .login .slogan{text-align:center;font-size:14px;opacity:.86;margin-top:10px;line-height:1.6;}
  .login .panel{margin-top:48px;background:#fff;border-radius:24px;padding:26px 22px 24px;
    box-shadow:0 16px 40px rgba(30,30,80,.22);color:var(--ink);}
  .login .label{font-size:13px;color:var(--sub);font-weight:600;margin-bottom:10px;}
  .login .name-input{width:100%;background:var(--bg);border-radius:14px;padding:14px 16px;font-size:16px;font-weight:600;}
  .role-row{display:flex;gap:12px;margin-top:20px;}
  .role-card{flex:1;background:var(--bg);border:2px solid transparent;border-radius:18px;
    padding:18px 10px;text-align:center;transition:.18s;}
  .role-card .emo{font-size:34px;}
  .role-card .rt{font-size:15px;font-weight:800;margin-top:8px;}
  .role-card .rd{font-size:11.5px;color:var(--sub);margin-top:4px;}
  .role-card.on{border-color:var(--primary);background:var(--primary-soft);transform:translateY(-2px);}
  .login .enter{width:100%;margin-top:24px;background:var(--primary);color:#fff;font-size:17px;font-weight:800;
    padding:16px;border-radius:16px;box-shadow:0 8px 20px rgba(91,108,246,.4);transition:.15s;}
  .login .enter:active{transform:scale(.97);}
  .login .enter:disabled{opacity:.45;box-shadow:none;}
  .login .foot{text-align:center;font-size:11.5px;opacity:.7;margin-top:auto;padding-top:30px;}

  /* ========== App shell ========== */
  .topbar{height:48px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:30;
    background:rgba(244,245,250,.86);backdrop-filter:blur(10px);font-size:16px;font-weight:800;
    border-bottom:1px solid var(--line);}
  .topbar .role-tag{position:absolute;right:14px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
    background:var(--primary-soft);color:var(--primary-d);}
  .body{flex:1;overflow-y:auto;padding:16px 16px 96px;}

  /* header greeting */
  .hello{background:linear-gradient(120deg,#6C7BFF,#5B6CF6);border-radius:22px;padding:20px 20px 22px;color:#fff;
    box-shadow:0 10px 26px rgba(91,108,246,.32);position:relative;overflow:hidden;}
  .hello::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;
    background:rgba(255,255,255,.12);}
  .hello .hi{font-size:21px;font-weight:850;}
  .hello .date{font-size:13px;opacity:.9;margin-top:6px;}
  .hello .tip{font-size:12.5px;opacity:.92;margin-top:14px;background:rgba(255,255,255,.16);
    display:inline-block;padding:6px 12px;border-radius:20px;}

  /* stat grid */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px;}
  .stat{background:var(--card);border-radius:16px;padding:13px 6px;text-align:center;box-shadow:var(--shadow-s);}
  .stat .n{font-size:23px;font-weight:850;line-height:1;}
  .stat .l{font-size:11px;color:var(--sub);margin-top:7px;font-weight:600;}
  .stat.c-amber .n{color:var(--amber);} .stat.c-blue .n{color:var(--blue);}
  .stat.c-green .n{color:var(--green);} .stat.c-red .n{color:var(--red);}

  .sec-title{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px;}
  .sec-title .t{font-size:16.5px;font-weight:850;}
  .sec-title .more{font-size:13px;color:var(--primary);font-weight:700;}

  /* task card */
  .tcard{background:var(--card);border-radius:18px;padding:15px 16px;box-shadow:var(--shadow-s);
    margin-bottom:11px;display:flex;gap:13px;align-items:flex-start;position:relative;overflow:hidden;}
  .tcard.overdue{box-shadow:0 4px 18px rgba(239,68,68,.16);}
  .tcard.overdue::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red);}
  .tcard.done{opacity:.62;}
  .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;}
  .check.on{background:var(--green);border-color:var(--green);}
  .tcard .main{flex:1;min-width:0;}
  .tcard .row1{display:flex;align-items:center;gap:8px;}
  .pill{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:8px;flex-shrink:0;}
  .tcard .ct{font-size:15.5px;font-weight:700;line-height:1.4;}
  .tcard.done .ct{text-decoration:line-through;}
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:9px;font-size:12.5px;color:var(--sub);}
  .meta .dl{font-weight:700;}
  .meta .dl.soon{color:var(--amber);} .meta .dl.over{color:var(--red);}
  .meta .sub-req{color:var(--sub);}

  .empty{text-align:center;padding:46px 20px;color:var(--sub);}
  .empty .e{font-size:54px;opacity:.55;}
  .empty .et{font-size:14px;margin-top:14px;line-height:1.6;}

  /* big cta */
  .cta{width:100%;background:var(--primary);color:#fff;font-size:16px;font-weight:800;padding:16px;
    border-radius:16px;box-shadow:0 8px 20px rgba(91,108,246,.34);display:flex;align-items:center;
    justify-content:center;gap:8px;transition:.15s;margin-top:6px;}
  .cta:active{transform:scale(.98);}
  .cta.ghost{background:var(--primary-soft);color:var(--primary-d);box-shadow:none;}

  /* ===== scan page ===== */
  .page-h{font-size:22px;font-weight:850;margin:6px 4px 4px;}
  .page-sub{font-size:13px;color:var(--sub);margin:0 4px 16px;line-height:1.6;}
  .scan-box{background:var(--card);border-radius:18px;box-shadow:var(--shadow-s);padding:14px;}
  .scan-box textarea{width:100%;height:140px;resize:none;line-height:1.7;font-size:15px;}
  .scan-box textarea::placeholder{color:#B7BCC9;}
  .scan-actions{display:flex;gap:10px;margin-top:12px;}
  .btn-sm{font-size:13px;font-weight:700;padding:9px 14px;border-radius:12px;background:var(--bg);color:var(--sub);}
  .result-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow-s);padding:14px;margin-bottom:11px;}
  .result-card .rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .result-card .rhead .idx{font-size:12px;color:var(--sub);font-weight:700;}
  .result-card .del{font-size:13px;color:var(--red);font-weight:700;}
  .field{display:flex;align-items:center;gap:10px;margin-top:9px;}
  .field .fl{font-size:12px;color:var(--sub);width:58px;flex-shrink:0;font-weight:600;}
  .field input,.field select{flex:1;background:var(--bg);border-radius:10px;padding:9px 11px;font-size:14px;font-weight:600;}

  /* ===== group page ===== */
  .gcard{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:17px 16px;margin-bottom:14px;}
  .gcard .gtitle{font-size:16.5px;font-weight:850;line-height:1.4;}
  .gcard .gdl{font-size:12.5px;color:var(--sub);margin-top:5px;}
  .prog{height:9px;background:var(--bg);border-radius:6px;margin-top:14px;overflow:hidden;}
  .prog .bar{height:100%;background:linear-gradient(90deg,#6C7BFF,#22C55E);border-radius:6px;transition:width .4s;}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-top:8px;font-weight:600;}
  .sub-list{margin-top:14px;border-top:1px solid var(--line);padding-top:6px;}
  .sub-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);}
  .sub-item:last-child{border-bottom:none;}
  .avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;color:#fff;}
  .sub-item .si-main{flex:1;min-width:0;}
  .sub-item .si-owner{font-size:14px;font-weight:700;}
  .sub-item .si-task{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .status-chip{font-size:11.5px;font-weight:800;padding:5px 11px;border-radius:20px;flex-shrink:0;transition:.15s;}
  .status-chip:active{transform:scale(.93);}
  .st-todo{background:#EEF0F4;color:var(--gray);}
  .st-doing{background:#E9F0FF;color:var(--blue);}
  .st-done{background:#E8F8F0;color:var(--green);}
  .st-overdue{background:#FDECEC;color:var(--red);}

  /* ===== me page ===== */
  .me-head{display:flex;align-items:center;gap:15px;background:var(--card);border-radius:20px;padding:20px 18px;
    box-shadow:var(--shadow-s);margin-bottom:16px;}
  .me-avatar{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#6C7BFF,#5B6CF6);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:850;}
  .me-name{font-size:19px;font-weight:850;}
  .me-role{font-size:12.5px;color:var(--sub);margin-top:5px;}
  .me-list{background:var(--card);border-radius:18px;box-shadow:var(--shadow-s);overflow:hidden;}
  .me-row{display:flex;align-items:center;gap:13px;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px;font-weight:600;}
  .me-row:last-child{border-bottom:none;}
  .me-row .ic{font-size:18px;}
  .me-row .arr{margin-left:auto;color:#C5C9D3;font-size:18px;}
  .me-row.danger{color:var(--red);}
  .ver{text-align:center;font-size:11.5px;color:#B7BCC9;margin-top:24px;}

  .readonly-banner{background:#FFF6E6;border:1px solid #FCE3B0;color:#A86A11;font-size:12.5px;font-weight:600;
    padding:10px 14px;border-radius:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

  /* ===== bottom tab ===== */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:64px;background:rgba(255,255,255,.92);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;z-index:40;
    padding-bottom:env(safe-area-inset-bottom);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--sub);font-size:10.5px;font-weight:700;transition:.15s;}
  .tab .ti{font-size:21px;line-height:1;}
  .tab.on{color:var(--primary);}
  .tab.on .ti{transform:translateY(-1px);}

  /* modal */
  .mask{position:absolute;inset:0;background:rgba(20,22,40,.4);z-index:60;display:flex;align-items:flex-end;}
  .sheet{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 30px;max-height:86%;overflow-y:auto;}
  .sheet h3{font-size:18px;font-weight:850;margin-bottom:18px;}
  .sheet .label{font-size:12.5px;color:var(--sub);font-weight:700;margin:14px 2px 7px;}
  .sheet input,.sheet select{width:100%;background:var(--bg);border-radius:12px;padding:13px 14px;font-size:15px;font-weight:600;}
  .members-pick{display:flex;flex-wrap:wrap;gap:8px;}
  .mpick{font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;background:var(--bg);color:var(--sub);border:2px solid transparent;}
  .mpick.on{background:var(--primary-soft);color:var(--primary-d);border-color:var(--primary);}
  .sub-edit{background:var(--bg);border-radius:14px;padding:12px;margin-top:10px;}
  .sub-edit .se-row{display:flex;gap:8px;}
  .sub-edit input{background:#fff;}
  .add-sub{font-size:13px;color:var(--primary);font-weight:700;margin-top:10px;}
</style>
</head>
<body>
<div id="app">
<div class="phone">

  <!-- ============ Login ============ -->
  <div class="login" v-if="screen==='login'">
    <div class="logo"><span class="lb"><svg viewBox="0 0 64 64" width="62" height="62" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="12" y="14" width="40" height="34" rx="6.5" fill="#fff" stroke="#D9DCE8" stroke-width="1.6"/>
      <path d="M12 22 V20.5 a6.5 6.5 0 0 1 6.5 -6.5 h27 a6.5 6.5 0 0 1 6.5 6.5 V22 Z" fill="#EF4444"/>
      <rect x="23.5" y="10" width="3" height="8.5" rx="1.5" fill="#BC3636"/>
      <rect x="37.5" y="10" width="3" height="8.5" rx="1.5" fill="#BC3636"/>
      <text x="27" y="43" font-family="'Arial Black','Arial',sans-serif" font-size="20" font-weight="900" fill="#EF4444" text-anchor="middle">8</text>
      <g stroke="#2E3650" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8.8 40 l3.6 -2.3"/><path d="M21.2 40 l-3.6 -2.3"/>
        <circle cx="15" cy="46" r="7" fill="#fff"/>
        <path d="M10.8 52.7 l-1.7 2.3"/><path d="M19.2 52.7 l1.7 2.3"/>
        <path d="M15 46 V42.4 M15 46 l2.5 1.4" stroke-width="1.6"/>
      </g>
      <circle cx="15" cy="46" r="1" fill="#2E3650"/>
      <path d="M33 38 L40 46 L53 25" stroke="#34C759" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg></span></div>
    <h1>Task Tamer</h1>
    <div class="slogan">Paste your teacher's homework — AI sorts every deadline<br>Reminders so nothing slips · group work, organized</div>
    <div class="panel">
      <div class="label">Your nickname</div>
      <input class="name-input" v-model="loginName" placeholder="e.g. Alex" maxlength="16">
      <div class="label" style="margin-top:20px">I am…</div>
      <div class="role-row">
        <div class="role-card" :class="{on:loginRole==='student'}" @click="loginRole='student'">
          <div class="emo">🎒</div><div class="rt">Student</div><div class="rd">Track homework · groups</div>
        </div>
        <div class="role-card" :class="{on:loginRole==='parent'}" @click="loginRole='parent'">
          <div class="emo">👨‍👩‍👧</div><div class="rt">Parent</div><div class="rd">View your kid's work</div>
        </div>
      </div>
      <button class="enter" :disabled="!loginName||!loginRole" @click="doLogin">Enter Task Tamer</button>
    </div>
    <div class="foot">Saved on-device · nothing uploaded · demo only</div>
  </div>

  <!-- ============ App shell ============ -->
  <template v-else>
    <div class="topbar">
      {{ tabTitle }}
      <span class="role-tag">{{ isParent ? 'Parent view' : 'Student' }}</span>
    </div>

    <div class="body">

      <!-- ===== Home ===== -->
      <div v-if="tab==='home'">
        <div class="hello">
          <div class="hi">{{ greeting }}, {{ user.name }} 👋</div>
          <div class="date">{{ todayText }}</div>
          <div class="tip" v-if="!isParent">📌 {{ todayCount }} {{ todayCount===1?'task':'tasks' }} due today</div>
          <div class="tip" v-else>👀 Viewing {{ childName }}'s schedule</div>
        </div>

        <div class="stats">
          <div class="stat c-amber"><div class="n">{{ stat.today }}</div><div class="l">Due today</div></div>
          <div class="stat c-blue"><div class="n">{{ stat.week }}</div><div class="l">This week</div></div>
          <div class="stat c-green"><div class="n">{{ stat.done }}</div><div class="l">Done</div></div>
          <div class="stat c-red"><div class="n">{{ stat.overdue }}</div><div class="l">Overdue</div></div>
        </div>

        <div class="sec-title"><div class="t">📋 To-do</div></div>

        <div v-if="sortedTasks.length===0" class="empty">
          <div class="e">🗒️</div>
          <div class="et">No homework yet<br>{{ isParent ? "It'll show up once your kid adds some" : 'Paste what your teacher posted to auto-sort it' }}</div>
        </div>

        <div v-for="t in sortedTasks" :key="t.id" class="tcard" :class="{overdue:isOverdue(t)&&!t.done, done:t.done}">
          <div class="check" :class="{on:t.done}" @click="!isParent && toggleDone(t)">{{ t.done ? '✓' : '' }}</div>
          <div class="main">
            <div class="row1">
              <span class="pill" :style="pillStyle(t.subject)">{{ t.subject||'Other' }}</span>
              <span class="ct">{{ t.content }}</span>
            </div>
            <div class="meta">
              <span class="dl" :class="dlClass(t)">⏰ {{ formatDL(t.deadline,t) }}</span>
              <span class="sub-req" v-if="t.submit">📎 {{ t.submit }}</span>
            </div>
          </div>
        </div>

        <button v-if="!isParent" class="cta" @click="tab='scan'" style="margin-top:8px">📋 Paste homework · auto-detect</button>
      </div>

      <!-- ===== Detect ===== -->
      <div v-if="tab==='scan'">
        <div class="page-h">✨ Smart Detect</div>
        <div class="page-sub">Paste the homework message your teacher sent — we'll pull out the subject, task and deadline automatically.</div>
        <div class="scan-box">
          <textarea v-model="scanInput" placeholder="Paste your teacher's homework here…
e.g. Math worksheet pages 3-5, due tomorrow before class. Take a photo and send it to the group."></textarea>
          <div class="scan-actions">
            <button class="btn-sm" @click="fillSample">Try sample</button>
            <button class="btn-sm" v-if="scanInput" @click="scanInput='';scanResults=[]">Clear</button>
            <button class="cta" style="flex:1;margin:0;padding:12px" @click="doScan">✨ Detect</button>
          </div>
        </div>

        <template v-if="scanResults.length">
          <div class="sec-title"><div class="t">Found {{ scanResults.length }} — please confirm</div></div>
          <div v-for="(r,i) in scanResults" :key="r.id" class="result-card">
            <div class="rhead">
              <span class="idx">#{{ i+1 }}</span>
              <span class="del" @click="scanResults.splice(i,1)">Delete</span>
            </div>
            <div class="field"><span class="fl">Subject</span>
              <select v-model="r.subject"><option v-for="s in subjectList" :value="s">{{ s }}</option></select>
            </div>
            <div class="field"><span class="fl">Task</span><input v-model="r.content" placeholder="Homework"></div>
            <div class="field"><span class="fl">Due</span><input type="datetime-local" v-model="r.deadline"></div>
            <div class="field"><span class="fl">Submit</span><input v-model="r.submit" placeholder="e.g. photo to group (optional)"></div>
          </div>
          <button class="cta" @click="confirmScan">✅ Confirm · add {{ scanResults.length }} to calendar</button>
        </template>
        <div v-else-if="scanned" class="empty"><div class="e">🤔</div><div class="et">Nothing detected — try a different message</div></div>
      </div>

      <!-- ===== Group ===== -->
      <div v-if="tab==='group'">
        <div class="readonly-banner" v-if="isParent">🔒 Parent view is read-only</div>
        <div class="sec-title"><div class="t">👥 Group tasks</div>
          <div class="more" v-if="!isParent" @click="openGroupSheet()">+ New</div>
        </div>

        <div v-if="groups.length===0" class="empty">
          <div class="e">🧩</div><div class="et">No group tasks yet<br>{{ isParent ? '' : "Tap 'New' to assign tasks to members" }}</div>
        </div>

        <div v-for="g in groups" :key="g.id" class="gcard">

<script>
const { createApp, ref, reactive, computed, watch, onMounted } = Vue;

const STORE_KEY = 'tasktamer_state_v1';

// Each subject: canonical English name + pill colors + keywords (English & Chinese)
const SUBJECT_DEFS = [
  {name:'Math',      color:['#E9F0FF','#3B6FF6'], kw:['math','maths','mathematics','algebra','geometry','calculus','数学']},
  {name:'English',   color:['#E8F8F0','#1A9E5B'], kw:['english','英语']},
  {name:'Chinese',   color:['#FDECEC','#E5484D'], kw:['chinese','mandarin','语文']},
  {name:'Physics',   color:['#EEF0FE','#5B6CF6'], kw:['physics','物理']},
  {name:'Chemistry', color:['#FFF3E6','#E8852B'], kw:['chemistry','化学']},
  {name:'Biology',   color:['#E8F8F0','#0E9E6E'], kw:['biology','bio','生物']},
  {name:'History',   color:['#F3EEFB','#8B5CF6'], kw:['history','历史']},
  {name:'Geography', color:['#E6F7F8','#0E9AA7'], kw:['geography','geo','地理']},
  {name:'Politics',  color:['#FDEFF6','#D6469A'], kw:['politics','political','civics','政治','道德与法治','道法']},
  {name:'Science',   color:['#E8F8F0','#0E9E6E'], kw:['science','科学']},
  {name:'P.E.',      color:['#FFF0EC','#F4612B'], kw:['physical education','gym','体育']},
  {name:'Music',     color:['#F3EEFB','#8B5CF6'], kw:['music','音乐']},
  {name:'Art',       color:['#FFF3E6','#E8852B'], kw:['art','drawing','美术']},
  {name:'IT',        color:['#E9F0FF','#3B6FF6'], kw:['computer science','computing','informatics','信息技术','信息']},
];
const SUBJECT_COLORS = {};
SUBJECT_DEFS.forEach(d=>{ SUBJECT_COLORS[d.name]=d.color; });
SUBJECT_COLORS['Other'] = ['#EEF0F4','#6B7280'];

const TASK_NOUNS = [
  // English
  'worksheet','exercise','exercises','problem','problems','question','questions','reading','essay','report','project','presentation','slides','slide','ppt','recite','memorize','memorise','vocabulary','vocab','word','words','homework','assignment','quiz','test','exam','review','preview','notes','diary','journal','page','pages','chapter','unit','workbook','draw','drawing','experiment','lab','video','recording','dictation','composition','translate','translation','summary','outline','flashcards','spelling','handout','packet','reflection',
  // Chinese
  '试卷','卷子','习题','练习册','练习','作业本','背诵','默写','听写','作文','周记','日记','报告','调查','手抄报','PPT','ppt','演讲','朗读','预习','复习','口算','计算','单词','课文','古诗','文言文','阅读','题','页','章节','单元','实验','绘画','视频','录音','导学案','学案','笔记'
];

// Submission method: canonical label + trigger keywords (English & Chinese)
const SUBMIT_DEFS = [
  {label:'Photo to group',  kw:['photo to the group','photo to group','send to the group','send to group','send it to the group','拍照发群','拍照上传','拍照','发群','发到群']},
  {label:'Dictation',       kw:['dictation','默写','听写']},
  {label:'Quiz',            kw:['quiz','测验']},
  {label:'Check-in',        kw:['check in','check-in','打卡']},
  {label:'Print out',       kw:['print out','printout','print','打印']},
  {label:'Email',           kw:['email','e-mail','邮件']},
  {label:'Hand in (paper)', kw:['hand in','hand-in','turn in','paper copy','on paper','纸质上交','纸质','上交','交到','交给']},
  {label:'Submit online',   kw:['submit online','upload','online submission','submit','在线提交','提交','网课']},
];

const WEEKDAYS = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};
const EN_WD = {sunday:0,monday:1,tuesday:2,wednesday:3,thursday:4,friday:5,saturday:6,
  sun:0,mon:1,tue:2,tues:2,wed:3,weds:3,thu:4,thur:4,thurs:4,fri:5,sat:6};
const EN_MONTH = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,
  jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,sept:8,oct:9,nov:10,dec:11};
const FILLERS_EN = /^(hi|hey|hello|class|everyone|guys|all|ok|okay|please|pls|kindly|remember|also|and|plus|note|reminder|attention|fyi|today|tonight|tomorrow|for)\b[\s,:.\-—]*/i;
const FILLERS_CN = /^(各位同学|同学们|大家|请|记得|另外|还有|其次|此外|以及|并且|今天|明天|后天)[\s,，、:：]*/;

function pad(n){return n<10?'0'+n:''+n;}
function isCJK(s){ return /[一-鿿]/.test(s); }
function reEsc(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function hasNoun(s){
  const low=s.toLowerCase();
  return TASK_NOUNS.some(n=> isCJK(n) ? s.includes(n) : new RegExp('\\b'+reEsc(n)+'\\b','i').test(low));
}
function detectSubject(t){
  const low=t.toLowerCase();
  for(const d of SUBJECT_DEFS){
    for(const k of d.kw){
      if(isCJK(k)){ if(t.includes(k)) return d.name; }
      else if(new RegExp('\\b'+reEsc(k)+'\\b','i').test(low)) return d.name;
    }
  }
  return '';
}
function detectSubmit(t){
  const low=t.toLowerCase();
  for(const d of SUBMIT_DEFS){
    for(const k of d.kw){
      if(isCJK(k) ? t.includes(k) : low.includes(k)) return d.label;
    }
  }
  return '';
}
function detectDeadline(text, base){
  const low = text.toLowerCase();
  const d = new Date(base.getFullYear(),base.getMonth(),base.getDate());
  let found=false, m;
  const MON='jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?';
  const monIdx=s=>{ s=s.replace(/\./g,''); return EN_MONTH[s]!==undefined?EN_MONTH[s]:EN_MONTH[s.slice(0,3)]; };
  // ----- which day -----
  if(/后天|day after tomorrow/.test(low)){ d.setDate(d.getDate()+2); found=true; }
  else if(/明天|明日|tomorrow|tmrw|tmr/.test(low)){ d.setDate(d.getDate()+1); found=true; }
  else if(m=low.match(/in\s+(\d{1,2})\s+days?/)){ d.setDate(d.getDate()+ +m[1]); found=true; }
  else if(m=low.match(/(\d{1,2})\s*[月\.\/]\s*(\d{1,2})/)){ d.setMonth(+m[1]-1); d.setDate(+m[2]); found=true; }
  else if(m=low.match(new RegExp('\\b('+MON+')\\.?\\s+(\\d{1,2})'))){ d.setMonth(monIdx(m[1])); d.setDate(+m[2]); found=true; }
  else if(m=low.match(new RegExp('\\b(\\d{1,2})(?:st|nd|rd|th)?\\s+('+MON+')'))){ d.setMonth(monIdx(m[2])); d.setDate(+m[1]); found=true; }
  else if(m=low.match(/(下{0,1})周[一二三四五六日天]|星期[一二三四五六日天]|礼拜[一二三四五六日天]/)){
    const wd = WEEKDAYS[m[0].slice(-1)];
    let diff = (wd - d.getDay() + 7) % 7;
    if(/下周/.test(m[0])) diff += 7;
    d.setDate(d.getDate()+diff); found=true;
  }
  else if(m=low.match(/\b(next\s+|this\s+)?(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tues|tue|weds|wed|thurs|thur|thu|fri|sat)\b/)){
    const wd = EN_WD[m[2]];
    let diff = (wd - d.getDay() + 7) % 7;
    if(diff===0) diff = 7;                 // bare weekday name = the next one
    if(m[1] && /next/.test(m[1])) diff += 7;
    d.setDate(d.getDate()+diff); found=true;
  }
  else if(/今天|今日|今晚|today|tonight|eod|end of day/.test(low)){ found=true; }
  // ----- time of day -----
  let h=22,mi=0;
  if(/早读|早自习|早晨|早上|before class|morning|first period/.test(low)){h=7;mi=30;}
  else if(/中午|午|noon|midday|lunch/.test(low)){h=12;mi=30;}
  else if(/放学|after school|end of school/.test(low)){h=17;mi=0;}
  else if(/晚自习|晚上|evening|study hall|tonight/.test(low)){h=19;mi=0;}
  else if(/睡前|before bed|bedtime/.test(low)){h=21;mi=0;}
  else if(m=low.match(/\b(\d{1,2})(?::(\d{2}))?\s*(a\.?m\.?|p\.?m\.?)/)){ h=+m[1]%12; if(/p/.test(m[3])) h+=12; mi=m[2]?+m[2]:0; }
  else if(m=low.match(/(\d{1,2})[:：点](\d{0,2})/)){ h=+m[1]; mi=m[2]?+m[2]:0; }
  d.setHours(h,mi,0,0);
  return {date:d, found};
}
function extractContent(piece){
  const segs = piece.split(/[，,、；;]/).map(s=>s.trim()).filter(Boolean);
  let pick = segs.find(s=>hasNoun(s)) || segs[0] || piece;
  // strip leading fillers (possibly stacked)
  let prev;
  do { prev=pick; pick = pick.replace(FILLERS_EN,'').replace(FILLERS_CN,''); } while(pick!==prev && pick);
  // strip a leading subject name
  for(const dfn of SUBJECT_DEFS){
    for(const k of dfn.kw){
      if(isCJK(k)) pick = pick.replace(new RegExp('^'+k+'(科)?(的)?'),'');
      else if(!k.includes('.')) pick = pick.replace(new RegExp('^'+reEsc(k)+"['’]?s?\\b[:\\s]*",'i'),'');
    }
  }
  pick = pick.replace(/^(hw|homework|assignment|task)\b(\s+(is|are))?[:\s]*/i,'');
  pick = pick.replace(/^(作业是|作业[:：]|的作业|作业)/,'');
  pick = pick.replace(/\s*\b(due|deadline)\b.*$/i,'');     // drop trailing "due ..."
  pick = pick.replace(/[。.，,；;、的了\s]+$/,'').trim();
  if(/^[a-z]/.test(pick)) pick = pick.charAt(0).toUpperCase()+pick.slice(1);
  return pick || piece.trim();
}
function parseHomework(text, base){
  const pieces = text.split(/\n+|[。！？；;]+|[.!?]+\s+/).map(s=>s.trim()).filter(s=>s.length>=3);
  const out=[];
  for(const p of pieces){
    const subject = detectSubject(p);
    if(!subject && !hasNoun(p)) continue;
    const dl = detectDeadline(p, base);
    out.push({
      id:'r'+Math.random().toString(36).slice(2,8),
      subject: subject||'Other',
      content: extractContent(p),
      deadline: toLocalInput(dl.date),
      submit: detectSubmit(p)
    });
  }
  return out;
}
function toLocalInput(d){ // -> 'YYYY-MM-DDTHH:mm' for datetime-local
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}

createApp({
  setup(){
    const screen = ref('login');
    const loginName = ref('');
    const loginRole = ref('');
    const tab = ref('home');
    const user = reactive({name:'', role:'student'});
    const childName = ref('Alex');
    const tasks = ref([]);
    const groups = ref([]);
    const scanInput = ref('');
    const scanResults = ref([]);
    const scanned = ref(false);
    const showGroupSheet = ref(false);
    const memberPool = ['Alex','Sam','Jamie','Taylor','Jordan','Casey'];
    const gForm = reactive({title:'',deadline:'',members:['Alex'],subtasks:[{owner:'Alex',content:'',deadline:''}]});

    const isParent = computed(()=>user.role==='parent');
    const subjectList = SUBJECT_DEFS.map(d=>d.name).concat(['Other']);

    // ---- persistence ----
    function save(){
      localStorage.setItem(STORE_KEY, JSON.stringify({user, tasks:tasks.value, groups:groups.value}));
    }
    function load(){
      const raw = localStorage.getItem(STORE_KEY);
      if(raw){
        try{
          const d = JSON.parse(raw);
          tasks.value = d.tasks||[]; groups.value = d.groups||[];
          if(d.user && d.user.name){ user.name=d.user.name; user.role=d.user.role; screen.value='main'; }
          return true;
        }catch(e){}
      }
      return false;
    }
    watch([user, tasks, groups], save, {deep:true});

    // ---- seed demo ----
    function seedDemo(){
      const now = new Date();
      const mk=(off,h,mi)=>{const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+off,h,mi);return d.toISOString();};
      tasks.value = [
        {id:'t1',subject:'Math',content:'Worksheet pages 3-5',deadline:mk(0,22,0),submit:'Photo to group',done:false},
        {id:'t2',subject:'English',content:'Recite Unit 5 vocabulary',deadline:mk(1,7,30),submit:'Dictation',done:false},
        {id:'t3',subject:'Physics',content:'Lab report: Free Fall',deadline:mk(2,22,0),submit:'Hand in (paper)',done:false},
        {id:'t4',subject:'Chinese',content:'Write a weekly journal',deadline:mk(-1,22,0),submit:'Hand in (paper)',done:false},
        {id:'t5',subject:'Chemistry',content:'Textbook exercises p.42',deadline:mk(3,19,0),submit:'',done:true},
      ];
      groups.value = [{
        id:'g1', title:'History group PPT: The Silk Road', deadline:mk(7,18,0),
        subtasks:[
          {id:'s1',owner:'Alex',content:'Research & gather sources',deadline:mk(2,18,0),status:'done'},
          {id:'s2',owner:'Sam',content:'Build the slides',deadline:mk(4,18,0),status:'doing'},
          {id:'s3',owner:'Jamie',content:'Write the script',deadline:mk(5,18,0),status:'todo'},
          {id:'s4',owner:'Taylor',content:'Collect images',deadline:mk(-1,18,0),status:'todo'},
        ]
      }];
    }

    // ---- login ----
    function doLogin(){
      user.name = loginName.value.trim();
      user.role = loginRole.value;
      if(tasks.value.length===0 && groups.value.length===0) seedDemo();
      screen.value='main'; tab.value='home';
    }
    function switchRole(){ user.role = isParent.value ? 'student':'parent'; if(isParent.value) tab.value='home'; }
    function resetAll(){ if(confirm('Clear all homework and group data?')){ localStorage.removeItem(STORE_KEY); location.reload(); } }

    // ---- date helpers ----
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const todayText = computed(()=>{
      const d=new Date();
      return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
    });
    const greeting = computed(()=>{const h=new Date().getHours();return h<12?'Good morning':h<18?'Good afternoon':'Good evening';});
    function timeStr(d){ let h=d.getHours(); const ap=h<12?'AM':'PM'; let hh=h%12; if(hh===0)hh=12; return hh+':'+pad(d.getMinutes())+' '+ap; }
    function isOverdue(t){ return new Date(t.deadline) < new Date(); }
    function formatDL(iso,t){
      const d=new Date(iso), now=new Date();
      const day0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());
      const diff=Math.round((dd-day0)/86400000);
      const hm=timeStr(d);
      let s;
      if(diff===0) s='Today '+hm; else if(diff===1) s='Tomorrow '+hm; else if(diff===2) s='In 2 days '+hm;
      else if(diff>2&&diff<7) s=DAYS[d.getDay()].slice(0,3)+' '+hm;
      else s=MONTHS[d.getMonth()]+' '+d.getDate()+' '+hm;
      if(t && !t.done && d<now) s='Overdue · '+s;
      return s;
    }
    function formatDate(iso){const d=new Date(iso);return MONTHS[d.getMonth()]+' '+d.getDate();}
    function dlClass(t){ if(t.done) return ''; const d=new Date(t.deadline),now=new Date();
      if(d<now) return 'over'; if((d-now)<86400000) return 'soon'; return ''; }

    // ---- stats ----
    const sortedTasks = computed(()=> [...tasks.value].sort((a,b)=>{
      if(a.done!==b.done) return a.done?1:-1;
      return new Date(a.deadline)-new Date(b.deadline);
    }));
    function sameDay(iso){const d=new Date(iso),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
    const todayCount = computed(()=> tasks.value.filter(t=>!t.done && sameDay(t.deadline)).length);
    const stat = computed(()=>{
      const now=new Date(); const weekEnd=new Date(now); weekEnd.setDate(now.getDate()+(7-now.getDay()||7)); weekEnd.setHours(23,59,59);
      return {
        today: tasks.value.filter(t=>!t.done && sameDay(t.deadline)).length,
        week: tasks.value.filter(t=>{const d=new Date(t.deadline);return d>=new Date(now.getFullYear(),now.getMonth(),now.getDate()) && d<=weekEnd;}).length,
        done: tasks.value.filter(t=>t.done).length,
        overdue: tasks.value.filter(t=>!t.done && new Date(t.deadline)<now).length,
      };
    });
    function toggleDone(t){ t.done=!t.done; }

    // ---- styles ----
    function pillStyle(s){const c=SUBJECT_COLORS[s]||SUBJECT_COLORS['Other'];return {background:c[0],color:c[1]};}
    function avatarColor(name){const colors=['#5B6CF6','#1A9E5B','#E8852B','#D6469A','#0E9AA7','#8B5CF6'];
      let h=0;for(const ch of name)h+=ch.charCodeAt(0);return colors[h%colors.length];}
    function initials(name){ if(!name) return '?'; const p=name.trim().split(/\s+/); return p.map(x=>x[0]).join('').slice(0,2).toUpperCase(); }

    // ---- scan ----
    function fillSample(){ scanInput.value="Math worksheet pages 3-5, due tomorrow before class — take a photo and send to the group.\nEnglish: recite Unit 5 vocabulary, quiz this Friday.\nPhysics lab report on Free Fall, due May 8."; }
    function doScan(){ scanned.value=true; scanResults.value = parseHomework(scanInput.value, new Date()); }
    function confirmScan(){
      for(const r of scanResults.value){
        tasks.value.push({id:'t'+Math.random().toString(36).slice(2,8),subject:r.subject,content:r.content,
          deadline:new Date(r.deadline).toISOString(),submit:r.submit,done:false});
      }
      scanResults.value=[]; scanInput.value=''; scanned.value=false; tab.value='home';
    }

    // ---- group ----
    function doneCount(g){return g.subtasks.filter(s=>s.status==='done').length;}
    function groupProgress(g){return g.subtasks.length?Math.round(doneCount(g)/g.subtasks.length*100):0;}
    function effStatus(st){ if(st.status!=='done' && new Date(st.deadline)<new Date()) return 'overdue'; return st.status; }
    function statusLabel(s){return {todo:'To do',doing:'Doing',done:'Done',overdue:'Overdue'}[s];}
    function cycleStatus(st){ const order=['todo','doing','done']; let i=order.indexOf(st.status); st.status=order[(i+1)%3]; }
    function openGroupSheet(){ gForm.title='';gForm.deadline='';gForm.members=['Alex'];gForm.subtasks=[{owner:'Alex',content:'',deadline:''}]; showGroupSheet.value=true; }
    function toggleMember(m){ const i=gForm.members.indexOf(m); if(i>=0){if(m!=='Alex')gForm.members.splice(i,1);} else gForm.members.push(m); }
    function addSub(){ gForm.subtasks.push({owner:gForm.members[0]||'Alex',content:'',deadline:gForm.deadline}); }
    function saveGroup(){
      if(!gForm.title){alert('Please enter a task name');return;}
      groups.value.push({
        id:'g'+Math.random().toString(36).slice(2,8), title:gForm.title,
        deadline: gForm.deadline?new Date(gForm.deadline+'T18:00').toISOString():new Date().toISOString(),
        subtasks: gForm.subtasks.filter(s=>s.content).map((s,i)=>({
          id:'s'+Math.random().toString(36).slice(2,8), owner:s.owner, content:s.content,
          deadline:(s.deadline||gForm.deadline)?new Date((s.deadline||gForm.deadline)+'T18:00').toISOString():new Date().toISOString(),
          status:'todo'
        }))
      });
      showGroupSheet.value=false;
    }

    const tabTitle = computed(()=>({home:'Task Tamer',scan:'Smart Detect',group:'Group Tasks',me:'Me'}[tab.value]));

    onMounted(load);

    return {screen,loginName,loginRole,tab,user,childName,tasks,groups,scanInput,scanResults,scanned,
      showGroupSheet,memberPool,gForm,isParent,subjectList,
      doLogin,switchRole,resetAll,todayText,greeting,isOverdue,formatDL,formatDate,dlClass,
      sortedTasks,todayCount,stat,toggleDone,pillStyle,avatarColor,initials,
      fillSample,doScan,confirmScan,doneCount,groupProgress,effStatus,statusLabel,cycleStatus,
      openGroupSheet,toggleMember,addSub,saveGroup,tabTitle};
  }
}).mount('#app');
</script>
</body>
</html>
