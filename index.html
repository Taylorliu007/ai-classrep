<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>AI课代表 · 作业管家</title>
<meta name="description" content="AI课代表 · 粘贴老师作业自动识别DDL，日历提醒不漏交，小组分工不混乱">
<meta name="theme-color" content="#5B6CF6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AI课代表">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
<style>
  :root{
    --primary:#5B6CF6; --primary-d:#4A5AE0; --primary-soft:#EEF0FE;
    --bg:#F4F5FA; --card:#FFFFFF; --ink:#1A1D29; --sub:#8A90A2;
    --line:#EDEEF3; --gray:#9AA0AE; --blue:#3B82F6; --green:#22C55E;
    --red:#EF4444; --amber:#F59E0B;
    --shadow:0 6px 24px rgba(40,44,80,.08);
    --shadow-s:0 2px 10px rgba(40,44,80,.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    background:#dcdde4;display:flex;justify-content:center;align-items:flex-start;color:var(--ink);
  }
  .phone{width:412px;max-width:100%;min-height:100vh;background:var(--bg);position:relative;
    box-shadow:0 10px 50px rgba(0,0,0,.18);overflow:hidden;display:flex;flex-direction:column;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input,textarea,select{font-family:inherit;font-size:15px;color:var(--ink);outline:none;border:none;background:none;}
  .fade-enter-active,.fade-leave-active{transition:opacity .18s;}
  .fade-enter-from,.fade-leave-to{opacity:0;}

  /* ========== 登录页 ========== */
  .login{flex:1;display:flex;flex-direction:column;color:#fff;
    background:radial-gradient(130% 80% at 50% 0%,#7B86FF 0%,#5B6CF6 45%,#4A5AE0 100%);
    padding:84px 30px 36px;}
  .login .logo{font-size:60px;text-align:center;filter:drop-shadow(0 10px 24px rgba(0,0,0,.25));}
  .login h1{text-align:center;font-size:30px;font-weight:850;letter-spacing:1px;margin-top:14px;}
  .login .slogan{text-align:center;font-size:14px;opacity:.86;margin-top:10px;line-height:1.6;}
  .login .panel{margin-top:48px;background:#fff;border-radius:24px;padding:26px 22px 24px;
    box-shadow:0 16px 40px rgba(30,30,80,.22);color:var(--ink);}
  .login .label{font-size:13px;color:var(--sub);font-weight:600;margin-bottom:10px;}
  .login .name-input{width:100%;background:var(--bg);border-radius:14px;padding:14px 16px;font-size:16px;font-weight:600;}
  .role-row{display:flex;gap:12px;margin-top:20px;}
  .role-card{flex:1;background:var(--bg);border:2px solid transparent;border-radius:18px;
    padding:18px 10px;text-align:center;transition:.18s;}
  .role-card .emo{font-size:34px;}
  .role-card .rt{font-size:15px;font-weight:800;margin-top:8px;}
  .role-card .rd{font-size:11.5px;color:var(--sub);margin-top:4px;}
  .role-card.on{border-color:var(--primary);background:var(--primary-soft);transform:translateY(-2px);}
  .login .enter{width:100%;margin-top:24px;background:var(--primary);color:#fff;font-size:17px;font-weight:800;
    padding:16px;border-radius:16px;box-shadow:0 8px 20px rgba(91,108,246,.4);transition:.15s;}
  .login .enter:active{transform:scale(.97);}
  .login .enter:disabled{opacity:.45;box-shadow:none;}
  .login .foot{text-align:center;font-size:11.5px;opacity:.7;margin-top:auto;padding-top:30px;}

  /* ========== 主框架 ========== */
  .topbar{height:48px;display:flex;align-items:center;justify-content:center;position:sticky;top:0;z-index:30;
    background:rgba(244,245,250,.86);backdrop-filter:blur(10px);font-size:16px;font-weight:800;
    border-bottom:1px solid var(--line);}
  .topbar .role-tag{position:absolute;right:14px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;
    background:var(--primary-soft);color:var(--primary-d);}
  .body{flex:1;overflow-y:auto;padding:16px 16px 96px;}

  /* header greeting */
  .hello{background:linear-gradient(120deg,#6C7BFF,#5B6CF6);border-radius:22px;padding:20px 20px 22px;color:#fff;
    box-shadow:0 10px 26px rgba(91,108,246,.32);position:relative;overflow:hidden;}
  .hello::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;
    background:rgba(255,255,255,.12);}
  .hello .hi{font-size:21px;font-weight:850;}
  .hello .date{font-size:13px;opacity:.9;margin-top:6px;}
  .hello .tip{font-size:12.5px;opacity:.92;margin-top:14px;background:rgba(255,255,255,.16);
    display:inline-block;padding:6px 12px;border-radius:20px;}

  /* stat grid */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:14px;}
  .stat{background:var(--card);border-radius:16px;padding:13px 6px;text-align:center;box-shadow:var(--shadow-s);}
  .stat .n{font-size:23px;font-weight:850;line-height:1;}
  .stat .l{font-size:11px;color:var(--sub);margin-top:7px;font-weight:600;}
  .stat.c-amber .n{color:var(--amber);} .stat.c-blue .n{color:var(--blue);}
  .stat.c-green .n{color:var(--green);} .stat.c-red .n{color:var(--red);}

  .sec-title{display:flex;align-items:center;justify-content:space-between;margin:22px 4px 12px;}
  .sec-title .t{font-size:16.5px;font-weight:850;}
  .sec-title .more{font-size:13px;color:var(--primary);font-weight:700;}

  /* task card */
  .tcard{background:var(--card);border-radius:18px;padding:15px 16px;box-shadow:var(--shadow-s);
    margin-bottom:11px;display:flex;gap:13px;align-items:flex-start;position:relative;overflow:hidden;}
  .tcard.overdue{box-shadow:0 4px 18px rgba(239,68,68,.16);}
  .tcard.overdue::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red);}
  .tcard.done{opacity:.62;}
  .check{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;transition:.15s;}
  .check.on{background:var(--green);border-color:var(--green);}
  .tcard .main{flex:1;min-width:0;}
  .tcard .row1{display:flex;align-items:center;gap:8px;}
  .pill{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:8px;flex-shrink:0;}
  .tcard .ct{font-size:15.5px;font-weight:700;line-height:1.4;}
  .tcard.done .ct{text-decoration:line-through;}
  .meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:9px;font-size:12.5px;color:var(--sub);}
  .meta .dl{font-weight:700;}
  .meta .dl.soon{color:var(--amber);} .meta .dl.over{color:var(--red);}
  .meta .sub-req{color:var(--sub);}

  .empty{text-align:center;padding:46px 20px;color:var(--sub);}
  .empty .e{font-size:54px;opacity:.55;}
  .empty .et{font-size:14px;margin-top:14px;line-height:1.6;}

  /* big cta */
  .cta{width:100%;background:var(--primary);color:#fff;font-size:16px;font-weight:800;padding:16px;
    border-radius:16px;box-shadow:0 8px 20px rgba(91,108,246,.34);display:flex;align-items:center;
    justify-content:center;gap:8px;transition:.15s;margin-top:6px;}
  .cta:active{transform:scale(.98);}
  .cta.ghost{background:var(--primary-soft);color:var(--primary-d);box-shadow:none;}

  /* ===== scan page ===== */
  .page-h{font-size:22px;font-weight:850;margin:6px 4px 4px;}
  .page-sub{font-size:13px;color:var(--sub);margin:0 4px 16px;line-height:1.6;}
  .scan-box{background:var(--card);border-radius:18px;box-shadow:var(--shadow-s);padding:14px;}
  .scan-box textarea{width:100%;height:140px;resize:none;line-height:1.7;font-size:15px;}
  .scan-box textarea::placeholder{color:#B7BCC9;}
  .scan-actions{display:flex;gap:10px;margin-top:12px;}
  .btn-sm{font-size:13px;font-weight:700;padding:9px 14px;border-radius:12px;background:var(--bg);color:var(--sub);}
  .result-card{background:var(--card);border-radius:16px;box-shadow:var(--shadow-s);padding:14px;margin-bottom:11px;}
  .result-card .rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .result-card .rhead .idx{font-size:12px;color:var(--sub);font-weight:700;}
  .result-card .del{font-size:13px;color:var(--red);font-weight:700;}
  .field{display:flex;align-items:center;gap:10px;margin-top:9px;}
  .field .fl{font-size:12px;color:var(--sub);width:42px;flex-shrink:0;font-weight:600;}
  .field input,.field select{flex:1;background:var(--bg);border-radius:10px;padding:9px 11px;font-size:14px;font-weight:600;}

  /* ===== group page ===== */
  .gcard{background:var(--card);border-radius:20px;box-shadow:var(--shadow);padding:17px 16px;margin-bottom:14px;}
  .gcard .gtitle{font-size:16.5px;font-weight:850;line-height:1.4;}
  .gcard .gdl{font-size:12.5px;color:var(--sub);margin-top:5px;}
  .prog{height:9px;background:var(--bg);border-radius:6px;margin-top:14px;overflow:hidden;}
  .prog .bar{height:100%;background:linear-gradient(90deg,#6C7BFF,#22C55E);border-radius:6px;transition:width .4s;}
  .prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-top:8px;font-weight:600;}
  .sub-list{margin-top:14px;border-top:1px solid var(--line);padding-top:6px;}
  .sub-item{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);}
  .sub-item:last-child{border-bottom:none;}
  .avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:800;color:#fff;}
  .sub-item .si-main{flex:1;min-width:0;}
  .sub-item .si-owner{font-size:14px;font-weight:700;}
  .sub-item .si-task{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .status-chip{font-size:11.5px;font-weight:800;padding:5px 11px;border-radius:20px;flex-shrink:0;transition:.15s;}
  .status-chip:active{transform:scale(.93);}
  .st-todo{background:#EEF0F4;color:var(--gray);}
  .st-doing{background:#E9F0FF;color:var(--blue);}
  .st-done{background:#E8F8F0;color:var(--green);}
  .st-overdue{background:#FDECEC;color:var(--red);}

  /* ===== me page ===== */
  .me-head{display:flex;align-items:center;gap:15px;background:var(--card);border-radius:20px;padding:20px 18px;
    box-shadow:var(--shadow-s);margin-bottom:16px;}
  .me-avatar{width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,#6C7BFF,#5B6CF6);
    color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:850;}
  .me-name{font-size:19px;font-weight:850;}
  .me-role{font-size:12.5px;color:var(--sub);margin-top:5px;}
  .me-list{background:var(--card);border-radius:18px;box-shadow:var(--shadow-s);overflow:hidden;}
  .me-row{display:flex;align-items:center;gap:13px;padding:16px 18px;border-bottom:1px solid var(--line);font-size:15px;font-weight:600;}
  .me-row:last-child{border-bottom:none;}
  .me-row .ic{font-size:18px;}
  .me-row .arr{margin-left:auto;color:#C5C9D3;font-size:18px;}
  .me-row.danger{color:var(--red);}
  .ver{text-align:center;font-size:11.5px;color:#B7BCC9;margin-top:24px;}

  .readonly-banner{background:#FFF6E6;border:1px solid #FCE3B0;color:#A86A11;font-size:12.5px;font-weight:600;
    padding:10px 14px;border-radius:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

  /* ===== bottom tab ===== */
  .tabbar{position:absolute;left:0;right:0;bottom:0;height:64px;background:rgba(255,255,255,.92);
    backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;z-index:40;
    padding-bottom:env(safe-area-inset-bottom);}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    color:var(--sub);font-size:10.5px;font-weight:700;transition:.15s;}
  .tab .ti{font-size:21px;line-height:1;}
  .tab.on{color:var(--primary);}
  .tab.on .ti{transform:translateY(-1px);}

  /* modal */
  .mask{position:absolute;inset:0;background:rgba(20,22,40,.4);z-index:60;display:flex;align-items:flex-end;}
  .sheet{width:100%;background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 30px;max-height:86%;overflow-y:auto;}
  .sheet h3{font-size:18px;font-weight:850;margin-bottom:18px;}
  .sheet .label{font-size:12.5px;color:var(--sub);font-weight:700;margin:14px 2px 7px;}
  .sheet input,.sheet select{width:100%;background:var(--bg);border-radius:12px;padding:13px 14px;font-size:15px;font-weight:600;}
  .members-pick{display:flex;flex-wrap:wrap;gap:8px;}
  .mpick{font-size:13px;font-weight:700;padding:8px 14px;border-radius:20px;background:var(--bg);color:var(--sub);border:2px solid transparent;}
  .mpick.on{background:var(--primary-soft);color:var(--primary-d);border-color:var(--primary);}
  .sub-edit{background:var(--bg);border-radius:14px;padding:12px;margin-top:10px;}
  .sub-edit .se-row{display:flex;gap:8px;}
  .sub-edit input{background:#fff;}
  .add-sub{font-size:13px;color:var(--primary);font-weight:700;margin-top:10px;}
</style>
</head>
<body>
<div id="app">
<div class="phone">

  <!-- ============ 登录页 ============ -->
  <div class="login" v-if="screen==='login'">
    <div class="logo">📚</div>
    <h1>AI课代表</h1>
    <div class="slogan">复制老师的作业，自动整理 DDL<br>提醒不漏交 · 小组分工不混乱</div>
    <div class="panel">
      <div class="label">你的昵称</div>
      <input class="name-input" v-model="loginName" placeholder="例如：小林" maxlength="10">
      <div class="label" style="margin-top:20px">我是…</div>
      <div class="role-row">
        <div class="role-card" :class="{on:loginRole==='student'}" @click="loginRole='student'">
          <div class="emo">🎒</div><div class="rt">学生</div><div class="rd">记作业·管小组</div>
        </div>
        <div class="role-card" :class="{on:loginRole==='parent'}" @click="loginRole='parent'">
          <div class="emo">👨‍👩‍👧</div><div class="rt">家长</div><div class="rd">查看孩子作业</div>
        </div>
      </div>
      <button class="enter" :disabled="!loginName||!loginRole" @click="doLogin">进入 AI课代表</button>
    </div>
    <div class="foot">本地保存 · 数据不上传 · 仅供学习演示</div>
  </div>

  <!-- ============ 主框架 ============ -->
  <template v-else>
    <div class="topbar">
      {{ tabTitle }}
      <span class="role-tag">{{ isParent ? '家长视角' : '学生' }}</span>
    </div>

    <div class="body">

      <!-- ===== 首页 ===== -->
      <div v-if="tab==='home'">
        <div class="hello">
          <div class="hi">{{ greeting }}，{{ user.name }} 👋</div>
          <div class="date">{{ todayText }}</div>
          <div class="tip" v-if="!isParent">📌 今天有 {{ todayCount }} 项作业要交</div>
          <div class="tip" v-else>👀 正在查看 {{ childName }} 的作业安排</div>
        </div>

        <div class="stats">
          <div class="stat c-amber"><div class="n">{{ stat.today }}</div><div class="l">今日待交</div></div>
          <div class="stat c-blue"><div class="n">{{ stat.week }}</div><div class="l">本周作业</div></div>
          <div class="stat c-green"><div class="n">{{ stat.done }}</div><div class="l">已完成</div></div>
          <div class="stat c-red"><div class="n">{{ stat.overdue }}</div><div class="l">已逾期</div></div>
        </div>

        <div class="sec-title"><div class="t">📋 待办作业</div></div>

        <div v-if="sortedTasks.length===0" class="empty">
          <div class="e">🗒️</div>
          <div class="et">还没有作业<br>{{ isParent ? '等孩子录入后这里会显示' : '把老师发的作业粘进来，自动整理' }}</div>
        </div>

        <div v-for="t in sortedTasks" :key="t.id" class="tcard" :class="{overdue:isOverdue(t)&&!t.done, done:t.done}">
          <div class="check" :class="{on:t.done}" @click="!isParent && toggleDone(t)">{{ t.done ? '✓' : '' }}</div>
          <div class="main">
            <div class="row1">
              <span class="pill" :style="pillStyle(t.subject)">{{ t.subject||'其他' }}</span>
              <span class="ct">{{ t.content }}</span>
            </div>
            <div class="meta">
              <span class="dl" :class="dlClass(t)">⏰ {{ formatDL(t.deadline,t) }}</span>
              <span class="sub-req" v-if="t.submit">📎 {{ t.submit }}</span>
            </div>
          </div>
        </div>

        <button v-if="!isParent" class="cta" @click="tab='scan'" style="margin-top:8px">📋 粘贴作业，一键识别</button>
      </div>

      <!-- ===== 识别页 ===== -->
      <div v-if="tab==='scan'">
        <div class="page-h">✨ 智能识别</div>
        <div class="page-sub">复制老师在群里发的作业消息，粘贴到下面，自动提取科目、内容和截止时间。</div>
        <div class="scan-box">
          <textarea v-model="scanInput" placeholder="把老师布置的作业粘到这里…
例如：今天数学试卷第3-5页，明天早读前交，记得拍照发群。"></textarea>
          <div class="scan-actions">
            <button class="btn-sm" @click="fillSample">试试示例</button>
            <button class="btn-sm" v-if="scanInput" @click="scanInput='';scanResults=[]">清空</button>
            <button class="cta" style="flex:1;margin:0;padding:12px" @click="doScan">✨ 一键识别</button>
          </div>
        </div>

        <template v-if="scanResults.length">
          <div class="sec-title"><div class="t">识别到 {{ scanResults.length }} 条，请确认</div></div>
          <div v-for="(r,i) in scanResults" :key="r.id" class="result-card">
            <div class="rhead">
              <span class="idx">第 {{ i+1 }} 条</span>
              <span class="del" @click="scanResults.splice(i,1)">删除</span>
            </div>
            <div class="field"><span class="fl">科目</span>
              <select v-model="r.subject"><option v-for="s in subjectList" :value="s">{{ s }}</option></select>
            </div>
            <div class="field"><span class="fl">内容</span><input v-model="r.content" placeholder="作业内容"></div>
            <div class="field"><span class="fl">截止</span><input type="datetime-local" v-model="r.deadline"></div>
            <div class="field"><span class="fl">要求</span><input v-model="r.submit" placeholder="如：拍照发群（可空）"></div>
          </div>
          <button class="cta" @click="confirmScan">✅ 确认，加入 {{ scanResults.length }} 条到日历</button>
        </template>
        <div v-else-if="scanned" class="empty"><div class="e">🤔</div><div class="et">没识别出作业，换一段文字试试</div></div>
      </div>

      <!-- ===== 小组页 ===== -->
      <div v-if="tab==='group'">
        <div class="readonly-banner" v-if="isParent">🔒 家长视角为只读，不能修改进度</div>
        <div class="sec-title"><div class="t">👥 小组任务</div>
          <div class="more" v-if="!isParent" @click="openGroupSheet()">+ 新建</div>
        </div>

        <div v-if="groups.length===0" class="empty">
          <div class="e">🧩</div><div class="et">还没有小组任务<br>{{ isParent ? '' : '点右上角「新建」，给组员分配任务' }}</div>
        </div>

        <div v-for="g in groups" :key="g.id" class="gcard">
          <div class="gtitle">{{ g.title }}</div>
          <div class="gdl">🎯 总截止：{{ formatDate(g.deadline) }}　·　{{ g.subtasks.length }} 个分工</div>
          <div class="prog"><div class="bar" :style="{width: groupProgress(g)+'%'}"></div></div>
          <div class="prog-label">
            <span>整体进度</span>
            <span>{{ doneCount(g) }}/{{ g.subtasks.length }} 完成 · {{ groupProgress(g) }}%</span>
          </div>
          <div class="sub-list">
            <div v-for="st in g.subtasks" :key="st.id" class="sub-item">
              <div class="avatar" :style="{background:avatarColor(st.owner)}">{{ st.owner.slice(-2) }}</div>
              <div class="si-main">
                <div class="si-owner">{{ st.owner }}</div>
                <div class="si-task">{{ st.content }} · {{ formatDate(st.deadline) }}</div>
              </div>
              <span class="status-chip" :class="'st-'+effStatus(st)" @click="!isParent && cycleStatus(st)">
                {{ statusLabel(effStatus(st)) }}
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- ===== 我的页 ===== -->
      <div v-if="tab==='me'">
        <div class="me-head">
          <div class="me-avatar">{{ user.name.slice(0,1) }}</div>
          <div>
            <div class="me-name">{{ user.name }}</div>
            <div class="me-role">{{ isParent ? '家长账号 · 查看模式' : '学生账号' }}</div>
          </div>
        </div>
        <div class="me-list">
          <div class="me-row" @click="switchRole"><span class="ic">🔄</span>切换身份（{{ isParent?'切到学生':'切到家长' }}）<span class="arr">›</span></div>
          <div class="me-row"><span class="ic">🔔</span>提醒：截止前 1 天 + 2 小时<span class="arr">›</span></div>
          <div class="me-row"><span class="ic">ℹ️</span>关于 AI课代表<span class="arr">›</span></div>
          <div class="me-row danger" @click="resetAll"><span class="ic">🗑️</span>清空所有数据<span class="arr">›</span></div>
        </div>
        <div class="ver">AI课代表 V1.0 · 本地演示版</div>
      </div>

    </div>

    <!-- ===== 底部 tab ===== -->
    <div class="tabbar">
      <div class="tab" :class="{on:tab==='home'}" @click="tab='home'"><div class="ti">🏠</div>首页</div>
      <div class="tab" v-if="!isParent" :class="{on:tab==='scan'}" @click="tab='scan'"><div class="ti">✨</div>识别</div>
      <div class="tab" :class="{on:tab==='group'}" @click="tab='group'"><div class="ti">👥</div>小组</div>
      <div class="tab" :class="{on:tab==='me'}" @click="tab='me'"><div class="ti">🙋</div>我的</div>
    </div>

    <!-- ===== 新建小组任务弹层 ===== -->
    <div class="mask" v-if="showGroupSheet" @click.self="showGroupSheet=false">
      <div class="sheet">
        <h3>新建小组任务</h3>
        <div class="label">任务名称</div>
        <input v-model="gForm.title" placeholder="如：历史小组PPT《丝绸之路》">
        <div class="label">总截止时间</div>
        <input type="date" v-model="gForm.deadline">
        <div class="label">参与成员（点击选择，第一个默认是你）</div>
        <div class="members-pick">
          <span v-for="m in memberPool" :key="m" class="mpick" :class="{on:gForm.members.includes(m)}" @click="toggleMember(m)">{{ m }}</span>
        </div>
        <div class="label">分工（给成员分配子任务）</div>
        <div class="sub-edit" v-for="(s,i) in gForm.subtasks" :key="i">
          <div class="se-row">
            <select v-model="s.owner" style="flex:0 0 90px;background:#fff;border-radius:10px;padding:10px">
              <option v-for="m in gForm.members" :value="m">{{ m }}</option>
            </select>
            <input v-model="s.content" placeholder="子任务内容">
          </div>
          <input type="date" v-model="s.deadline" style="margin-top:8px">
        </div>
        <div class="add-sub" @click="addSub">+ 添加一条分工</div>
        <button class="cta" style="margin-top:20px" @click="saveGroup">创建小组任务</button>
      </div>
    </div>
  </template>

</div>
</div>

<script>
const { createApp, ref, reactive, computed, watch, onMounted } = Vue;

const STORE_KEY = 'classrep_state_v1';
const SUBJECTS = ['语文','数学','英语','物理','化学','生物','政治','历史','地理','道德与法治','道法','科学','体育','音乐','美术','信息技术','信息'];
const SUBJECT_ALIAS = {'道法':'道德与法治','信息':'信息技术'};
const SUBJECT_COLORS = {
  '语文':['#FDECEC','#E5484D'],'数学':['#E9F0FF','#3B6FF6'],'英语':['#E8F8F0','#1A9E5B'],
  '物理':['#EEF0FE','#5B6CF6'],'化学':['#FFF3E6','#E8852B'],'生物':['#E8F8F0','#0E9E6E'],
  '政治':['#FDEFF6','#D6469A'],'历史':['#F3EEFB','#8B5CF6'],'地理':['#E6F7F8','#0E9AA7'],
  '道德与法治':['#FDEFF6','#D6469A'],'科学':['#E8F8F0','#0E9E6E'],'体育':['#FFF0EC','#F4612B'],
  '音乐':['#F3EEFB','#8B5CF6'],'美术':['#FFF3E6','#E8852B'],'信息技术':['#E9F0FF','#3B6FF6'],
  '其他':['#EEF0F4','#6B7280']
};
const TASK_NOUNS = ['试卷','卷子','习题','练习册','练习','作业本','背诵','默写','听写','作文','周记','日记','报告','调查','手抄报','PPT','ppt','演讲','朗读','预习','复习','口算','计算','单词','课文','古诗','文言文','阅读','题','页','章节','单元','实验','绘画','视频','录音','导学案','学案','笔记'];
const SUBMIT_KW = ['拍照发群','拍照上传','拍照','照片','纸质上交','纸质','上交','交到','交给','打印','提交','默写','听写','打卡','发群','发到群','钉钉','微信','在线提交','网课'];
const WEEKDAYS = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'日':0,'天':0};

function pad(n){return n<10?'0'+n:''+n;}
function detectSubject(t){
  for(const s of SUBJECTS){ if(t.includes(s)) return SUBJECT_ALIAS[s]||s; }
  return '';
}
function detectSubmit(t){
  for(const k of SUBMIT_KW){ if(t.includes(k)) return k; }
  return '';
}
function detectDeadline(text, base){
  const d = new Date(base.getFullYear(),base.getMonth(),base.getDate());
  let found=false;
  let m;
  if(/后天/.test(text)){ d.setDate(d.getDate()+2); found=true; }
  else if(/明天|明日/.test(text)){ d.setDate(d.getDate()+1); found=true; }
  else if(m=text.match(/(\d{1,2})[月\.\/](\d{1,2})/)){ d.setMonth(+m[1]-1); d.setDate(+m[2]); found=true; }
  else if(m=text.match(/(下{0,1})周[一二三四五六日天]|星期[一二三四五六日天]|礼拜[一二三四五六日天]/)){
    const wd = WEEKDAYS[m[0].slice(-1)];
    let diff = (wd - d.getDay() + 7) % 7;
    if(/下周/.test(m[0])) diff += 7;
    d.setDate(d.getDate()+diff); found=true;
  }
  else if(/今天|今日|今晚/.test(text)){ found=true; }
  // 时间点
  let h=22,mi=0;
  if(/早读|早自习|早晨|早上/.test(text)){h=7;mi=30;}
  else if(/午|中午/.test(text)){h=12;mi=30;}
  else if(/放学/.test(text)){h=17;mi=0;}
  else if(/晚自习|晚上/.test(text)){h=19;mi=0;}
  else if(/睡前/.test(text)){h=21;mi=0;}
  else if(m=text.match(/(\d{1,2})[:：点](\d{0,2})/)){h=+m[1]; mi=m[2]?+m[2]:0;}
  d.setHours(h,mi,0,0);
  return {date:d, found};
}
function extractContent(piece){
  const segs = piece.split(/[，,、；;]/).map(s=>s.trim()).filter(Boolean);
  let pick = segs.find(s=>TASK_NOUNS.some(n=>s.includes(n))) || segs[0] || piece;
  pick = pick.replace(/^(各位同学|同学们|大家|请|记得|另外|还有|其次|此外|以及|并且|今天|明天|后天)/,'');
  for(const s of SUBJECTS){ pick = pick.replace(new RegExp('^'+s+'(科){0,1}(的){0,1}'),''); }
  pick = pick.replace(/^(作业是|作业[:：]|的作业|作业)/,'').replace(/[。.，,；;的了]$/,'').trim();
  return pick || piece;
}
function parseHomework(text, base){
  const pieces = text.split(/[\n。!！?？]+/).map(s=>s.trim()).filter(s=>s.length>=3);
  const out=[];
  for(const p of pieces){
    const subject = detectSubject(p);
    const content = extractContent(p);
    if(!subject && !TASK_NOUNS.some(n=>p.includes(n))) continue;
    const dl = detectDeadline(p, base);
    out.push({
      id:'r'+Math.random().toString(36).slice(2,8),
      subject: subject||'其他',
      content,
      deadline: toLocalInput(dl.date),
      submit: detectSubmit(p)
    });
  }
  return out;
}
function toLocalInput(d){ // -> 'YYYY-MM-DDTHH:mm' for datetime-local
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())+'T'+pad(d.getHours())+':'+pad(d.getMinutes());
}

createApp({
  setup(){
    const screen = ref('login');
    const loginName = ref('');
    const loginRole = ref('');
    const tab = ref('home');
    const user = reactive({name:'', role:'student'});
    const childName = ref('小林');
    const tasks = ref([]);
    const groups = ref([]);
    const scanInput = ref('');
    const scanResults = ref([]);
    const scanned = ref(false);
    const showGroupSheet = ref(false);
    const memberPool = ['小林','小王','小李','小张','小赵','小陈'];
    const gForm = reactive({title:'',deadline:'',members:['小林'],subtasks:[{owner:'小林',content:'',deadline:''}]});

    const isParent = computed(()=>user.role==='parent');
    const subjectList = ['语文','数学','英语','物理','化学','生物','政治','历史','地理','道德与法治','科学','体育','音乐','美术','信息技术','其他'];

    // ---- persistence ----
    function save(){
      localStorage.setItem(STORE_KEY, JSON.stringify({user, tasks:tasks.value, groups:groups.value}));
    }
    function load(){
      const raw = localStorage.getItem(STORE_KEY);
      if(raw){
        try{
          const d = JSON.parse(raw);
          tasks.value = d.tasks||[]; groups.value = d.groups||[];
          if(d.user && d.user.name){ user.name=d.user.name; user.role=d.user.role; screen.value='main'; }
          return true;
        }catch(e){}
      }
      return false;
    }
    watch([user, tasks, groups], save, {deep:true});

    // ---- seed demo ----
    function seedDemo(){
      const now = new Date();
      const mk=(off,h,mi)=>{const d=new Date(now.getFullYear(),now.getMonth(),now.getDate()+off,h,mi);return d.toISOString();};
      tasks.value = [
        {id:'t1',subject:'数学',content:'试卷第3-5页',deadline:mk(0,22,0),submit:'拍照发群',done:false},
        {id:'t2',subject:'英语',content:'背诵 Unit 5 单词',deadline:mk(1,7,30),submit:'课堂听写',done:false},
        {id:'t3',subject:'物理',content:'实验报告《自由落体》',deadline:mk(2,22,0),submit:'纸质上交',done:false},
        {id:'t4',subject:'语文',content:'周记一篇',deadline:mk(-1,22,0),submit:'交语文课代表',done:false},
        {id:'t5',subject:'化学',content:'课后习题 P42',deadline:mk(3,19,0),submit:'',done:true},
      ];
      groups.value = [{
        id:'g1', title:'历史小组PPT《丝绸之路》', deadline:mk(7,18,0),
        subtasks:[
          {id:'s1',owner:'小林',content:'查资料·整理史料',deadline:mk(2,18,0),status:'done'},
          {id:'s2',owner:'小王',content:'制作PPT',deadline:mk(4,18,0),status:'doing'},
          {id:'s3',owner:'小李',content:'撰写讲稿',deadline:mk(5,18,0),status:'todo'},
          {id:'s4',owner:'小张',content:'搜集配图',deadline:mk(-1,18,0),status:'todo'},
        ]
      }];
    }

    // ---- login ----
    function doLogin(){
      user.name = loginName.value.trim();
      user.role = loginRole.value;
      if(tasks.value.length===0 && groups.value.length===0) seedDemo();
      screen.value='main'; tab.value='home';
    }
    function switchRole(){ user.role = isParent.value ? 'student':'parent'; if(isParent.value) tab.value='home'; }
    function resetAll(){ if(confirm('确定清空所有作业和小组数据？')){ localStorage.removeItem(STORE_KEY); location.reload(); } }

    // ---- date helpers ----
    const todayText = computed(()=>{
      const d=new Date(); const w='日一二三四五六'[d.getDay()];
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 星期${w}`;
    });
    const greeting = computed(()=>{const h=new Date().getHours();return h<6?'凌晨好':h<11?'早上好':h<13?'中午好':h<18?'下午好':'晚上好';});
    function isOverdue(t){ return new Date(t.deadline) < new Date(); }
    function formatDL(iso,t){
      const d=new Date(iso), now=new Date();
      const day0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
      const dd=new Date(d.getFullYear(),d.getMonth(),d.getDate());
      const diff=Math.round((dd-day0)/86400000);
      const hm=pad(d.getHours())+':'+pad(d.getMinutes());
      let s;
      if(diff===0) s='今天 '+hm; else if(diff===1) s='明天 '+hm; else if(diff===2) s='后天 '+hm;
      else if(diff>2&&diff<7) s='周'+'日一二三四五六'[d.getDay()]+' '+hm;
      else s=(d.getMonth()+1)+'月'+d.getDate()+'日 '+hm;
      if(t && !t.done && d<now) s='已逾期 · '+s;
      return s;
    }
    function formatDate(iso){const d=new Date(iso);return (d.getMonth()+1)+'月'+d.getDate()+'日';}
    function dlClass(t){ if(t.done) return ''; const d=new Date(t.deadline),now=new Date();
      if(d<now) return 'over'; if((d-now)<86400000) return 'soon'; return ''; }

    // ---- stats ----
    const sortedTasks = computed(()=> [...tasks.value].sort((a,b)=>{
      if(a.done!==b.done) return a.done?1:-1;
      return new Date(a.deadline)-new Date(b.deadline);
    }));
    function sameDay(iso){const d=new Date(iso),n=new Date();return d.getFullYear()===n.getFullYear()&&d.getMonth()===n.getMonth()&&d.getDate()===n.getDate();}
    const todayCount = computed(()=> tasks.value.filter(t=>!t.done && sameDay(t.deadline)).length);
    const stat = computed(()=>{
      const now=new Date(); const weekEnd=new Date(now); weekEnd.setDate(now.getDate()+(7-now.getDay()||7)); weekEnd.setHours(23,59,59);
      return {
        today: tasks.value.filter(t=>!t.done && sameDay(t.deadline)).length,
        week: tasks.value.filter(t=>{const d=new Date(t.deadline);return d>=new Date(now.getFullYear(),now.getMonth(),now.getDate()) && d<=weekEnd;}).length,
        done: tasks.value.filter(t=>t.done).length,
        overdue: tasks.value.filter(t=>!t.done && new Date(t.deadline)<now).length,
      };
    });
    function toggleDone(t){ t.done=!t.done; }

    // ---- styles ----
    function pillStyle(s){const c=SUBJECT_COLORS[s]||SUBJECT_COLORS['其他'];return {background:c[0],color:c[1]};}
    function avatarColor(name){const colors=['#5B6CF6','#1A9E5B','#E8852B','#D6469A','#0E9AA7','#8B5CF6'];
      let h=0;for(const ch of name)h+=ch.charCodeAt(0);return colors[h%colors.length];}

    // ---- scan ----
    function fillSample(){ scanInput.value='各位同学，今天数学作业是试卷第3-5页，明天早读前交，记得拍照发群里。\n另外语文背诵《岳阳楼记》全文，周五默写。'; }
    function doScan(){ scanned.value=true; scanResults.value = parseHomework(scanInput.value, new Date()); }
    function confirmScan(){
      for(const r of scanResults.value){
        tasks.value.push({id:'t'+Math.random().toString(36).slice(2,8),subject:r.subject,content:r.content,
          deadline:new Date(r.deadline).toISOString(),submit:r.submit,done:false});
      }
      scanResults.value=[]; scanInput.value=''; scanned.value=false; tab.value='home';
    }

    // ---- group ----
    function doneCount(g){return g.subtasks.filter(s=>s.status==='done').length;}
    function groupProgress(g){return g.subtasks.length?Math.round(doneCount(g)/g.subtasks.length*100):0;}
    function effStatus(st){ if(st.status!=='done' && new Date(st.deadline)<new Date()) return 'overdue'; return st.status; }
    function statusLabel(s){return {todo:'未开始',doing:'进行中',done:'已完成',overdue:'已逾期'}[s];}
    function cycleStatus(st){ const order=['todo','doing','done']; let i=order.indexOf(st.status); st.status=order[(i+1)%3]; }
    function openGroupSheet(){ gForm.title='';gForm.deadline='';gForm.members=['小林'];gForm.subtasks=[{owner:'小林',content:'',deadline:''}]; showGroupSheet.value=true; }
    function toggleMember(m){ const i=gForm.members.indexOf(m); if(i>=0){if(m!=='小林')gForm.members.splice(i,1);} else gForm.members.push(m); }
    function addSub(){ gForm.subtasks.push({owner:gForm.members[0]||'小林',content:'',deadline:gForm.deadline}); }
    function saveGroup(){
      if(!gForm.title){alert('请填写任务名称');return;}
      groups.value.push({
        id:'g'+Math.random().toString(36).slice(2,8), title:gForm.title,
        deadline: gForm.deadline?new Date(gForm.deadline+'T18:00').toISOString():new Date().toISOString(),
        subtasks: gForm.subtasks.filter(s=>s.content).map((s,i)=>({
          id:'s'+Math.random().toString(36).slice(2,8), owner:s.owner, content:s.content,
          deadline:(s.deadline||gForm.deadline)?new Date((s.deadline||gForm.deadline)+'T18:00').toISOString():new Date().toISOString(),
          status:'todo'
        }))
      });
      showGroupSheet.value=false;
    }

    const tabTitle = computed(()=>({home:'AI课代表',scan:'智能识别',group:'小组任务',me:'我的'}[tab.value]));

    onMounted(load);

    return {screen,loginName,loginRole,tab,user,childName,tasks,groups,scanInput,scanResults,scanned,
      showGroupSheet,memberPool,gForm,isParent,subjectList,
      doLogin,switchRole,resetAll,todayText,greeting,isOverdue,formatDL,formatDate,dlClass,
      sortedTasks,todayCount,stat,toggleDone,pillStyle,avatarColor,
      fillSample,doScan,confirmScan,doneCount,groupProgress,effStatus,statusLabel,cycleStatus,
      openGroupSheet,toggleMember,addSub,saveGroup,tabTitle};
  }
}).mount('#app');
</script>
</body>
</html>
